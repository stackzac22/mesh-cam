[env:xiao_sense]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; PSRAM is required for the camera frame buffer
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; esp32-camera, SD_MMC, and FS are bundled with the Arduino-ESP32 core,
; so no lib_deps are needed for this sketch.
